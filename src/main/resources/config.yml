# Thresholds & settings for each check. Adjust as needed.


# Aim Analysis Settings
aimanalysis:
  default-duration: 60 # seconds
  base-max-yaw-threshold: 20.0 # degrees per tick
  base-min-stddev: 0.5 # minimum standard deviation
  outlier-percent: 0.05 # fraction trimmed from each end


# CPS Settings
cps:
  # how many seconds to run the test by default
  default-duration: 30
  # feedback interval for when it sends the targets 5 seconds of their recorded cps.
  feedback-interval: 5

  # Per-check thresholds and weights
  burst:
    dt-threshold-millis: 25 # max interval in ms considered 'perfect burst'
    ratio-scale: 2.0 # scaling factor for finish() ratio

  entropy:
    min-samples: 5 # minimum clicks to compute entropy

  variance:
    min-samples: 5 # minimum intervals to compute variance
    cv-multiplier: 5.0 # multiplier applied to coefficient of variation

  metrics:
    w-mean: 0.0 # Detects overall average click speed (scale 0–20)
    w-stddev: 2.0 # Measures consistency of click intervals (scale 0–10)
    w-skewness: 0.5 # Identifies asymmetry in click patterns (e.g., acceleration) (scale 0–2)
    w-kurtosis: 0.5 # Highlights heavy tails/outliers in click distribution (scale 0–2)
    w-entropy: 2.0 # Gauges randomness/unpredictability of clicks (scale 0–2)
    w-lqr: 1.0 # (Longest Quiet Ratio) – Effective at spotting double-clicks or irregular bursts (scale 0–30)


killauratest:
  default-duration-ticks: 100 # Test Duration
  max-npc-hits: 3 # Max NPC Hits
  max-gaze-count: 50
  min-gaze-threshold: 3
  max-reach-violations: 3
  max-total-score: 50
  max-reach: 3.05
  aim-threshold: 15.0


nofall:
  # upward launch velocity (blocks/tick)
  launch-velocity: 1.2
  # gravity constant used for fall distance calculation
  gravity: 0.08
  # minimum TPS for no adjustment, else multiply expected damage by this factor
  min-tps: 18
  tps-adjust-factor: 0.85
  # threshold factor: actual < expected * invalidation-factor → suspicious
  invalidation-factor: 0.85
  # list of blocks that negate fall damage entirely
  safe-blocks:
    - HAY_BLOCK
    - LADDER
    - VINE
    - WATER
    - STATIONARY_WATER
    - SLIME_BLOCK
    - WEB
    - BED_BLOCK
    - LAVA
    - STATIONARY_LAVA


velocity:
  base-threshold: 1.20 # Base horizontal movement threshold (blocks)
  slow-penalty: 0.15 # Each level of slowness reduces threshold by this amount
  speed-bonus: 0.25   # Each level of speed boost increases threshold by this amount
  # If TPS falls below this, apply a multiplier per missing tick
  low-tps-floor: 17.0
  low-tps-multiplier-per-tps: 0.05
  # How many ticks before timing out the test
  timeout-ticks: 100
  # Blocks that count as 'slow blocks' and cancel the test
  slow-blocks:
    - SOUL_SAND
    - WEB
    - WATER
    - LADDER
    - VINE
    - ICE
    - PACKED_ICE